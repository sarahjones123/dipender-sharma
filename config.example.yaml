# Release Notes Automation Configuration
# Copy this file to config.yaml and add your API keys

# =============================================================================
# AI Provider Configuration (REQUIRED)
# =============================================================================

# Choose your AI provider: "anthropic", "openai", or "azure_openai"
ai_provider: "anthropic"

# Your AI API key
# - Anthropic:    Get from console.anthropic.com (starts with sk-ant-)
# - OpenAI:       Get from platform.openai.com (starts with sk-)
# - Azure OpenAI: Get from your Azure portal resource page
ai_api_key: "YOUR_API_KEY_HERE"

# Model to use
# Anthropic options:
#   - claude-sonnet-4-6         (recommended: latest, best quality)
#   - claude-3-5-sonnet-20241022
#   - claude-3-haiku-20240307   (faster, lower cost)
# OpenAI options:
#   - gpt-4o (recommended)
#   - gpt-4
#   - gpt-3.5-turbo (faster, cheaper)
# Azure OpenAI: use your deployment name (not the model name)
model: "claude-sonnet-4-6"

# ── Azure OpenAI only ─────────────────────────────────────────────────────────
# Required only when ai_provider is "azure_openai"
# azure_endpoint: "https://your-resource.openai.azure.com/"
# azure_api_version: "2024-02-01"

# =============================================================================
# VCS Provider Configuration (REQUIRED)
# =============================================================================

# Choose your version control provider: "github", "gitlab", or "bitbucket"
# Defaults to "github" if not set.
vcs_provider: "github"

# ── GitHub ────────────────────────────────────────────────────────────────────
# Your GitHub personal access token
# Get from: github.com/settings/tokens
# Required scopes: public_repo (public) or repo (private)
github_token: "YOUR_GITHUB_TOKEN_HERE"

# ── GitLab ────────────────────────────────────────────────────────────────────
# Required only when vcs_provider is "gitlab"
# gitlab_token: "YOUR_GITLAB_TOKEN_HERE"
# gitlab_url: "https://gitlab.com"   # change for self-hosted GitLab

# ── Bitbucket ─────────────────────────────────────────────────────────────────
# Required only when vcs_provider is "bitbucket"
# Create an app password at: bitbucket.org/account/settings/app-passwords
# Required permissions: Repositories → Read
# bitbucket_username: "your-username"
# bitbucket_app_password: "YOUR_APP_PASSWORD_HERE"

# =============================================================================
# Optional Settings
# =============================================================================

# Default repository (can be overridden with --repo flag)
# Format: owner/repo-name
# Example: default_repo: "octocat/Hello-World"
default_repo: ""

# Default output filename (can be overridden with --output flag)
output_file: "release_notes.md"

# Date format for generated notes
# Uses Python strftime format
# Examples:
#   - "%Y-%m-%d" → 2024-01-28
#   - "%B %d, %Y" → January 28, 2024
#   - "%m/%d/%Y" → 01/28/2024
date_format: "%Y-%m-%d"

# Maximum number of commits to process (0 = no limit)
# Useful for testing or rate limit management
max_commits: 0

# Include merge commits in categorization
# Most merge commits should be filtered by prompt exclusion rules
include_merge_commits: false

# Enable verbose logging
verbose: false

# =============================================================================
# Batch Processing (Optional)
# =============================================================================

# Process multiple repositories in one run.
# Can also be specified via --repos on the command line.
# batch_repos:
#   - owner/repo-a
#   - owner/repo-b
#   - owner/repo-c

# =============================================================================
# README Generator Settings (used by 03-readme-generator/)
# =============================================================================

# Maximum number of lines to read from any single file when building repo context
# Increase for larger projects; decrease to reduce token usage
readme_max_file_lines: 200

# Sections to generate and their order
# Available values: description, installation, usage, contributing
readme_sections:
  - description
  - installation
  - usage
  - contributing

# =============================================================================
# Security Notes
# =============================================================================
#
# IMPORTANT:
# - Never commit this file with real API keys
# - This file is already in .gitignore
# - Use environment variables for production:
#     export AI_API_KEY="your-key"
#     export GITHUB_TOKEN="your-token"
#     export GITLAB_TOKEN="your-token"
#     export VCS_PROVIDER="gitlab"
# - Rotate keys regularly (every 90 days recommended)
# - Use minimal token scopes needed
#
# =============================================================================
