site_name: Dipender Sharma- Senior Technical Writer
site_description: AI-assisted documentation projects for technical writers
site_author: Dipender Sharma
site_url: https://github.com/sarahjones123/dipender-sharma

repo_name: dipender-sharma
repo_url: https://github.com/sarahjones123/dipender-sharma
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags
  - social

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sarahjones123/dipender-sharma
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!

nav:
  - Home: 
    - Welcome: index.md
    - Building the knowledgebase: ngenue_kb.md


  - Mkdocs:
    - mkdocs/index.md
    - Introduction: mkdocs/01-introduction.md
    - Prerequisites: mkdocs/02-prerequisites.md
    - Installation: mkdocs/03-installation.md
    - Project setup: mkdocs/04-project-setup.md
    - Writing content: mkdocs/05-writing-content.md
    - Configuration: mkdocs/06-configuration.md
    - Theming-material: mkdocs/07-theming-material.md
    - Navigation structure: mkdocs/08-navigation-structure.md
    - Plugins: mkdocs/09-plugins.md
    - Local development: mkdocs/10-local-development.md
    - Deployment via GitHub pages: mkdocs/11-deployment-github-pages.md
    - CI/CD automation: mkdocs/12-ci-cd-automation.md
    - Best Practices: mkdocs/13-best-practices.md
  
  
  - Git and GitHub: 
    - git/index.md
    - Why Git and GitHub matters: git/introduction.md
    - Part 1 — Git Basics: git/part-1-git-basics.md
    - Part 2 — Git vs GitHub: git/part-2-git-vs-github.md
    - Part 3 — Managing Versions: git/part-3-versioning.md
    - Part 4 — Pull Requests: git/part-4-pull-requests.md
    - Part 5 — CI/CD Pipelines: git/part-5-cicd-pipelines.md
    - Part 6 — Documentation Architecture: git/part-6-repo-architecture.md

  - API Docs: api.md
  - Automation: 
    - automation.md
    - API Docs generated: api/generated.md


extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js  

copyright: Built for technical writers exploring AI-assisted documentation automation
